<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist VTR PRO</title>

<style>
:root{
  --primary:#2ecc71;
  --dark:#1f2a30;
  --light:#f5f7fa;
  --card:#ffffff;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--light);
}

/* TOPO */
.header{
  background:linear-gradient(90deg,#27ae60,#2ecc71);
  color:white;
  padding:16px;
  font-size:18px;
  font-weight:bold;
}

/* DIAS SCROLL */
.days{
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:10px;
  background:white;
}

.day{
  min-width:60px;
  padding:10px;
  border-radius:12px;
  text-align:center;
  background:#eee;
  cursor:pointer;
}

.day.active{
  background:var(--primary);
  color:white;
}

/* MENU LATERAL */
.sidebar{
  position:fixed;
  left:-250px;
  top:0;
  width:250px;
  height:100%;
  background:#0f2027;
  color:white;
  transition:0.3s;
  padding:20px;
}

.sidebar.open{
  left:0;
}

.menu-btn{
  position:absolute;
  left:10px;
  top:10px;
  font-size:22px;
  cursor:pointer;
}

/* CHECKLIST */
.container{
  padding:15px;
}

.card{
  background:white;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.left{
  display:flex;
  align-items:center;
  gap:10px;
}

.check{
  width:22px;
  height:22px;
}

.done{
  text-decoration:line-through;
  opacity:0.6;
}

/* BOTÃO ADD */
.add{
  position:fixed;
  bottom:20px;
  right:20px;
  background:var(--primary);
  color:white;
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar">
  <h3>🚒 VTRs</h3>
  <p>ABT 0535</p>
  <p>AR 0426</p>
  <p>ATP 1225</p>
</div>

<div class="header">
  <span class="menu-btn" onclick="toggleMenu()">☰</span>
  Checklist Diário
</div>

<div class="days" id="days"></div>

<div class="container" id="list"></div>

<div class="add" onclick="addItem()">+</div>

<script>

// GERAR DIAS
const daysEl = document.getElementById("days");
const listEl = document.getElementById("list");

let currentDay = 0;

for(let i=1;i<=31;i++){
  const d = document.createElement("div");
  d.className="day";
  d.innerText=i;
  d.onclick=()=>selectDay(i);
  daysEl.appendChild(d);
}

function selectDay(day){
  currentDay = day;
  document.querySelectorAll(".day").forEach(d=>d.classList.remove("active"));
  daysEl.children[day-1].classList.add("active");
  render();
}

// DADOS
let data = {};

// RENDER
function render(){
  listEl.innerHTML="";
  const items = data[currentDay] || [];

  items.forEach((item,i)=>{
    const card = document.createElement("div");
    card.className="card";

    const left = document.createElement("div");
    left.className="left";

    const check = document.createElement("input");
    check.type="checkbox";
    check.checked=item.done;

    check.onchange=()=>{
      item.done=!item.done;
      render();
    };

    const text = document.createElement("div");
    text.innerText=item.text;
    if(item.done) text.classList.add("done");

    left.appendChild(check);
    left.appendChild(text);

    card.appendChild(left);
    listEl.appendChild(card);
  });
}

// ADD ITEM
function addItem(){
  const text = prompt("Novo item:");
  if(!text) return;

  if(!data[currentDay]) data[currentDay]=[];
  data[currentDay].push({text,done:false});
  render();
}

// MENU
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("open");
}

// INICIAL
selectDay(new Date().getDate());

</script>

</body>
</html>
